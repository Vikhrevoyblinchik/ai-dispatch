name: AI Dispatch

on:
  schedule:
    - cron: '0 * * * *'    # 每小时触发一次，实际发送时间由 config.yml send_hour_utc 控制
  workflow_dispatch:        # 允许手动触发测试（忽略时间检查，直接发送）

permissions:
  contents: write           # 允许 Action 把 sent_history.json commit 回仓库

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Check send hour
        id: timecheck
        run: |
          CONFIG_HOUR=$(grep 'send_hour_utc:' config.yml | awk '{print $2}')
          CURRENT_HOUR=$(date -u +%-H)
          CURRENT_DATE=$(date -u +%Y-%m-%d)
          LAST_SENT=$(python3 -c "import json; d=json.load(open('sent_history.json')); print(d.get('last_sent_date',''))" 2>/dev/null || echo "")

          echo "Config hour (UTC): $CONFIG_HOUR | Current hour (UTC): $CURRENT_HOUR | Last sent: $LAST_SENT | Today: $CURRENT_DATE"

          if [ "$LAST_SENT" = "$CURRENT_DATE" ]; then
            echo "Already sent today, skipping."
            echo "should_send=false" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_HOUR" -ge "$CONFIG_HOUR" ]; then
            echo "Hour $CURRENT_HOUR >= $CONFIG_HOUR and not yet sent today — will send."
            echo "should_send=true" >> $GITHUB_OUTPUT
          else
            echo "Hour $CURRENT_HOUR < $CONFIG_HOUR, too early."
            echo "should_send=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -r requirements.txt

      - name: Fetch and send AI news
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python fetch_news.py

      - name: Commit updated sent history
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_history.json
          git diff --staged --quiet || git commit -m "chore: update sent history [skip ci]"
          git push
